name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt -r requirements-fastapi.txt

      - name: Lint (flake8)
        run: flake8 src/ api/ tests/ --max-line-length=120 --exclude=__pycache__

      - name: Type check (mypy)
        run: mypy src/ api/ --ignore-missing-imports --exclude venv --exclude notebooks

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov=api --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
