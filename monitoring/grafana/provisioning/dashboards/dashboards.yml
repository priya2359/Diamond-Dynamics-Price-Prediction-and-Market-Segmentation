# filename: monitoring/grafana/provisioning/dashboards/dashboards.yml
# purpose:  Auto-provision the Diamond Dynamics dashboard from JSON file.
# version:  1.0

apiVersion: 1

providers:
  - name: "Diamond Dynamics"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
